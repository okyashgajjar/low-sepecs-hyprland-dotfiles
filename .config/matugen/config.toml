[config]
# Generate colors in dark mode by default
default_mode = "dark"

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar.css"
output_path = "~/.config/waybar/colors.css"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.pywalfox]
input_path = "~/.config/matugen/templates/pywalfox.json"
output_path = "~/.cache/wal/colors.json"

[templates.antigravity]
input_path = "~/.config/matugen/templates/antigravity.json"
output_path = "~/.config/Antigravity/User/settings.json"

[templates.brave]
input_path = "~/.config/matugen/templates/brave.css"
output_path = "~/.config/brave/colors.css"

[templates.dolphin]
input_path = "~/.config/matugen/templates/dolphin.colors"
output_path = "~/.local/share/color-schemes/Matugen.colors"

[templates.nvim]
input_path = "~/.config/matugen/templates/nvim.lua"
output_path = "~/.config/nvim/lua/matugen-colors.lua"

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk3.css"
output_path = "~/.config/gtk-3.0/gtk.css"
