# ── Modern Theme Config ──
# Optimized for Intel Celeron N4020 / UHD 600
decoration {
    rounding = 12
    blur {
        enabled = false
    }
    shadow {
        enabled = true
        range = 6
        render_power = 2
        color = rgba(00000022)
    }
}
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    allow_tearing = false
}
