# ── Retro Theme Config ──
source = ~/.config/hypr/colors.conf

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = rgb($active_border)
    col.inactive_border = rgb($inactive_border)
    layout = dwindle
    allow_tearing = false
}
