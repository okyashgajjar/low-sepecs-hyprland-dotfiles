# ── Retro Theme Config ──
# Optimized for Intel Celeron N4020 / UHD 600
# Lightest theme — zero visual overhead
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    allow_tearing = false
}
