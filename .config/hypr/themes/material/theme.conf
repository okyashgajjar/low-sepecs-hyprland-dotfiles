# ── Material Theme Config ──
source = ~/.config/hypr/colors.conf

decoration {
    rounding = 16
    blur {
        enabled = false
    }
    shadow {
        enabled = false
        range = 8
        render_power = 2
        color = rgba(00000028)
    }
}
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgb($active_border)
    col.inactive_border = rgb($inactive_border)
    layout = dwindle
    allow_tearing = false
}
