# ── Material Theme Config ──
# Optimized for Intel Celeron N4020 / UHD 600
decoration {
    rounding = 16
    blur {
        enabled = false
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000028)
    }
}
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    allow_tearing = false
}
