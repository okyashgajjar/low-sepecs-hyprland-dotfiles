# ── Glass Theme Config ──
# Optimized for Intel Celeron N4020 / UHD 600
# No blur — glass look achieved through Waybar/Rofi CSS only
decoration {
    rounding = 20
    blur {
        enabled = false
    }
    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba(00000030)
    }
}
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 1
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    allow_tearing = false
}
