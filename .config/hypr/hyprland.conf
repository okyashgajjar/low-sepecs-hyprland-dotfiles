# ──────────────────────────────────────────────
#   Hyprland Configuration
#   System: Intel Celeron N4020 · UHD 600 · 8 GB RAM
# ──────────────────────────────────────────────

# ── Monitor ──────────────────────────────────
monitor = eDP-1, 1920x1080@60, 0x0, 1

# ── Autostart ────────────────────────────────
exec-once = awww-daemon
exec-once = waybar
exec-once = dunst
exec-once = kitty

# ── Environment ──────────────────────────────
env = XCURSOR_SIZE,20
env = QT_QPA_PLATFORMTHEME,qt5ct

# ── Default Programs ─────────────────────────
$terminal = kitty
$browser  = brave
$menu     = rofi -show drun
$file     = thunar

# ── Input ────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# ── General ──────────────────────────────────
source = ~/.config/hypr/colors.conf

general {
    gaps_in = 5
    gaps_out = 13
    border_size = 0

    col.active_border = $active_border
    col.inactive_border = $inactive_border

    layout = dwindle
    allow_tearing = false
}

# ── Decoration ───────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled = false
        size = 5
        passes = 2
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = false
        range = 15
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

# ── Animations ───────────────────────────────
animations {
    enabled = false

    bezier = ease, 0.25, 0.1, 0.25, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 5, ease, slide
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, overshot, slidevert
    animation = border, 1, 5, ease
}

# ── Layouts ──────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ── Misc ─────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

# ── Keybinds ─────────────────────────────────
$mod = SUPER

bind = $mod, Return, exec, $terminal
bind = $mod, Space, exec, $menu
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, F, fullscreen, 0
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, B, exec, $browser
bind = $mod, E, exec, $file
bind = $mod, C, exec, libreoffice --writer
bind = $mod, T, exec, ~/.config/hypr/scripts/theme-selector.sh
bind = $mod, R, exec, ~/.config/hypr/scripts/random-wall.sh
bind = $mod, W, exec, ~/.config/waybar/scripts/theme-selector.sh

# Move focus (Vim-style)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Resize windows (Arrow keys)
binde = $mod, left,  resizeactive, -20 0
binde = $mod, right, resizeactive, 20 0
binde = $mod, up,    resizeactive, 0 -20
binde = $mod, down,  resizeactive, 0 20

# Switch workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move active window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume & brightness (media keys)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Screenshot (requires grim + slurp)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim - | wl-copy

# ── Window Rules ─────────────────────────────
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}


windowrule {
    name = firefox-opacity
    match:class = ^(firefox)$
    opacity = 0.95 0.90
}
